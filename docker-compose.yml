services:
  api:
    build: ./apps/api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./servers:/app/servers
      - ./backups:/app/backups
    environment:
      - DATABASE_URL=postgresql://mycubekub:mycubekub@db:5432/mycubekub
      - SERVERS_DIR=/app/servers
    ports:
      - "3002:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./apps/web
    ports:
      - "80:80"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mycubekub
      - POSTGRES_USER=mycubekub
      - POSTGRES_PASSWORD=mycubekub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycubekub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
